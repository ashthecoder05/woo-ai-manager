<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blockonomics Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1rem;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .logo { font-size: 1.3rem; }
    .header-text h1 { font-size: 0.9rem; font-weight: 600; color: #f0f0f0; }
    .header-text p  { font-size: 0.72rem; color: #888; margin-top: 1px; }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e; margin-left: auto; flex-shrink: 0;
    }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .msg {
      max-width: 88%;
      padding: 0.55rem 0.85rem;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #f7931a;
      color: #000;
      border-bottom-right-radius: 3px;
    }
    .msg.bot {
      align-self: flex-start;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 3px;
    }
    .msg.thinking { opacity: 0.5; font-style: italic; }

    /* Quick prompts */
    #quick-prompts {
      padding: 0 1rem 0.5rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .qp {
      font-size: 0.72rem;
      padding: 0.3rem 0.6rem;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #aaa;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    .qp:hover { border-color: #f7931a; color: #f7931a; }

    /* Input area */
    form {
      display: flex;
      gap: 0.4rem;
      padding: 0.75rem 1rem;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    textarea {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      color: #f0f0f0;
      font-size: 0.85rem;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
      height: 38px;
      max-height: 120px;
      outline: none;
      overflow-y: hidden;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #f7931a; }
    button[type=submit] {
      background: #f7931a;
      color: #000;
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 1rem;
      transition: opacity 0.15s;
    }
    button[type=submit]:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <div class="logo" id="header-logo">₿</div>
    <div class="header-text">
      <h1 id="header-title">Payment Assistant</h1>
      <p id="header-sub">Merchant support · Powered by Claude</p>
    </div>
    <div class="status-dot" title="Online"></div>
  </header>

  <div id="chat"></div>

  <div id="quick-prompts"></div>

  <form id="form">
    <textarea id="input" placeholder="Ask about payments, setup, fees, marketing…" rows="1"></textarea>
    <button type="submit" id="btn" aria-label="Send">➤</button>
  </form>

  <script>
    const chatEl = document.getElementById('chat');
    const form   = document.getElementById('form');
    const input  = document.getElementById('input');
    const btn    = document.getElementById('btn');

    // Read params set by embed.js
    const params        = new URLSearchParams(window.location.search);
    const API_URL       = params.get('api')      || '';
    const MERCHANT      = params.get('merchant') || '';
    const SESSION_TOKEN = params.get('token')    || '';

    // Merchant context is injected fresh on every request server-side
    const history = [];

    // ── Gateway config ────────────────────────────────────────────────────────
    const GATEWAY_CONFIG = {
      blockonomics: {
        logo: '₿',
        name: 'Blockonomics Assistant',
        sub: 'Bitcoin payments · Powered by Claude',
        placeholder: 'Ask about payments, setup, fees, Bitcoin marketing…',
        welcome: "Hi! I'm your Blockonomics merchant assistant.\n\nAsk me about payment issues, store setup, fee rates, or Bitcoin marketing. Use the quick buttons above to get started.",
        prompts: [
          { label: 'Payment stuck?',  q: 'Why is my payment not confirmed?' },
          { label: 'Webhook setup',   q: 'How do I set up my webhook callback URL?' },
          { label: 'Fee rates',       q: 'What are the current Bitcoin fee rates?' },
          { label: 'Write copy',      q: 'Help me write a product description that accepts Bitcoin' },
          { label: 'UCP manifest',    q: 'Generate a UCP manifest for my store' },
        ],
      },
      stripe: {
        logo: '💳',
        name: 'Stripe Assistant',
        sub: 'Stripe payments · Powered by Claude',
        placeholder: 'Ask about Stripe payments, setup, fees, marketing…',
        welcome: "Hi! I'm your Stripe merchant assistant.\n\nAsk me about payment issues, Stripe setup, fees, or store marketing. Use the quick buttons above to get started.",
        prompts: [
          { label: 'Payment failed?',   q: 'Why did my Stripe payment fail?' },
          { label: 'Webhook setup',     q: 'How do I set up my Stripe webhook?' },
          { label: 'Stripe fees',       q: 'What are Stripe processing fees?' },
          { label: 'Write copy',        q: 'Help me write a product description for my Stripe store' },
          { label: 'Refund process',    q: 'How do I process a refund in Stripe?' },
        ],
      },
      coinbase: {
        logo: '🔵',
        name: 'Coinbase Commerce Assistant',
        sub: 'Crypto payments · Powered by Claude',
        placeholder: 'Ask about Coinbase Commerce, setup, crypto fees…',
        welcome: "Hi! I'm your Coinbase Commerce merchant assistant.\n\nAsk me about payment issues, store setup, crypto fees, or marketing. Use the quick buttons above to get started.",
        prompts: [
          { label: 'Payment stuck?',   q: 'Why is my Coinbase Commerce payment not confirmed?' },
          { label: 'Webhook setup',    q: 'How do I set up my Coinbase Commerce webhook?' },
          { label: 'Crypto fees',      q: 'What are the current crypto fee rates?' },
          { label: 'Write copy',       q: 'Help me write a product description that accepts crypto' },
          { label: 'Supported coins',  q: 'Which cryptocurrencies does Coinbase Commerce support?' },
        ],
      },
      bitpay: {
        logo: '₿',
        name: 'BitPay Assistant',
        sub: 'Bitcoin payments · Powered by Claude',
        placeholder: 'Ask about BitPay payments, setup, fees…',
        welcome: "Hi! I'm your BitPay merchant assistant.\n\nAsk me about payment issues, BitPay setup, fees, or marketing. Use the quick buttons above to get started.",
        prompts: [
          { label: 'Payment stuck?',   q: 'Why is my BitPay payment not confirmed?' },
          { label: 'Webhook setup',    q: 'How do I set up my BitPay webhook?' },
          { label: 'Fee rates',        q: 'What are current Bitcoin fee rates?' },
          { label: 'Write copy',       q: 'Help me write a product description that accepts Bitcoin' },
          { label: 'Lightning setup',  q: 'How do I enable Lightning Network on BitPay?' },
        ],
      },
      nowpayments: {
        logo: '🪙',
        name: 'NOWPayments Assistant',
        sub: 'Crypto payments · Powered by Claude',
        placeholder: 'Ask about NOWPayments, setup, crypto fees…',
        welcome: "Hi! I'm your NOWPayments merchant assistant.\n\nAsk me about payment issues, store setup, crypto fees, or marketing. Use the quick buttons above to get started.",
        prompts: [
          { label: 'Payment stuck?',    q: 'Why is my NOWPayments payment not confirmed?' },
          { label: 'Webhook setup',     q: 'How do I set up my NOWPayments webhook?' },
          { label: 'Supported coins',   q: 'Which coins does NOWPayments support?' },
          { label: 'Write copy',        q: 'Help me write a product description that accepts crypto' },
          { label: 'Auto-conversion',   q: 'How does auto-conversion to stablecoins work?' },
        ],
      },
      coingate: {
        logo: '🔷',
        name: 'CoinGate Assistant',
        sub: 'Crypto payments · Powered by Claude',
        placeholder: 'Ask about CoinGate, setup, fees…',
        welcome: "Hi! I'm your CoinGate merchant assistant.\n\nAsk me about payment issues, store setup, fees, or marketing. Use the quick buttons above to get started.",
        prompts: [
          { label: 'Payment stuck?',  q: 'Why is my CoinGate payment not confirmed?' },
          { label: 'Webhook setup',   q: 'How do I set up my CoinGate webhook?' },
          { label: 'SEPA settlement', q: 'How does SEPA settlement work on CoinGate?' },
          { label: 'Write copy',      q: 'Help me write a product description that accepts crypto' },
          { label: 'Supported coins', q: 'Which coins does CoinGate support?' },
        ],
      },
    };

    function applyGatewayConfig(gateway) {
      const cfg = GATEWAY_CONFIG[gateway] || GATEWAY_CONFIG['blockonomics'];

      document.getElementById('header-logo').textContent  = cfg.logo;
      document.getElementById('header-title').textContent = cfg.name;
      document.getElementById('header-sub').textContent   = cfg.sub;
      document.getElementById('input').placeholder        = cfg.placeholder;

      const qpEl = document.getElementById('quick-prompts');
      qpEl.innerHTML = '';
      cfg.prompts.forEach(p => {
        const b = document.createElement('button');
        b.className   = 'qp';
        b.dataset.q   = p.q;
        b.textContent = p.label;
        b.addEventListener('click', () => sendMessage(p.q));
        qpEl.appendChild(b);
      });

      addMsg(cfg.welcome, 'bot');
    }

    // Load gateway config + news in a single call, apply everything at once
    async function initWidget() {
      let gateway = 'blockonomics';
      let newsData = null;
      if (API_URL) {
        try {
          const qs = MERCHANT ? `?merchant=${encodeURIComponent(MERCHANT)}` : '';
          const res = await fetch(`${API_URL}/api/news${qs}`);
          if (res.ok) {
            newsData = await res.json();
            if (newsData.gateway) gateway = newsData.gateway.toLowerCase();
          }
        } catch { /* use default */ }
      }
      applyGatewayConfig(gateway);
      if (newsData && newsData.title) showNewsCard(newsData);
    }

    function addMsg(text, role, thinking = false) {
      const div = document.createElement('div');
      div.className = `msg ${role}${thinking ? ' thinking' : ''}`;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    async function sendMessage(text) {
      if (!text.trim()) return;
      input.value = '';
      autoResize();
      btn.disabled = true;

      addMsg(text, 'user');
      history.push({ role: 'user', content: text });

      const thinking = addMsg('Thinking…', 'bot', true);

      try {
        const res = await fetch(`${API_URL}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: history,
            merchant: MERCHANT || undefined,
            session_token: SESSION_TOKEN || undefined,
          }),
        });
        const data = await res.json();
        thinking.remove();
        const reply = data.reply || data.detail || 'Something went wrong.';
        addMsg(reply, 'bot');
        history.push({ role: 'assistant', content: reply });
      } catch {
        thinking.textContent = 'Network error — check that the assistant backend is running.';
        thinking.classList.remove('thinking');
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage(input.value);
    });

    // Shift+Enter = newline, Enter alone = send
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(input.value);
      }
    });

    // Auto-resize textarea
    function autoResize() {
      input.style.height = '38px';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      input.style.overflowY = input.scrollHeight > 120 ? 'auto' : 'hidden';
    }
    input.addEventListener('input', autoResize);

    const GATEWAY_DISPLAY_NAMES = {
      blockonomics: 'Blockonomics', stripe: 'Stripe', coinbase: 'Coinbase Commerce',
      bitpay: 'BitPay', nowpayments: 'NOWPayments', coingate: 'CoinGate',
    };

    function isSafeUrl(urlString) {
      try {
        const url = new URL(urlString);
        return ['http:', 'https:'].includes(url.protocol);
      } catch { return false; }
    }

    function showNewsCard(data) {
      const card = document.createElement('div');
      card.style.cssText = `
        margin: 0.25rem 0; padding: 0.7rem 0.85rem;
        background: rgba(247,147,26,0.08); border: 1px solid rgba(247,147,26,0.25);
        border-radius: 10px; font-size: 0.78rem; line-height: 1.5;
        align-self: flex-start; max-width: 92%;
      `;

      const gatewayName = GATEWAY_DISPLAY_NAMES[data.gateway] || data.gateway || 'Payment Gateway';

      const label = document.createElement('div');
      label.style.cssText = 'font-size:0.65rem;font-weight:700;color:#f7931a;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.3rem;';
      label.textContent = `New update from ${gatewayName}`;

      // Strip markdown ** and trailing punctuation from title
      const cleanTitle = (data.title || '').replace(/\*+/g, '').replace(/[:\s]+$/, '');
      const title = document.createElement('div');
      title.style.cssText = 'font-weight:600;color:#f0f0f0;margin-bottom:0.2rem;';
      title.textContent = cleanTitle;

      card.appendChild(label);
      card.appendChild(title);

      if (data.body) {
        const body = document.createElement('div');
        body.style.color = '#aaa';
        body.textContent = data.body;
        card.appendChild(body);
      }

      const linksRow = document.createElement('div');
      linksRow.style.cssText = 'margin-top:0.4rem;display:flex;gap:0.75rem;flex-wrap:wrap;';
      if (data.url && isSafeUrl(data.url)) {
        const link = document.createElement('a');
        link.href = data.url; link.target = '_blank'; link.rel = 'noopener noreferrer';
        link.style.cssText = 'color:#f7931a;font-size:0.72rem;text-decoration:none;';
        link.textContent = 'Read full update →';
        linksRow.appendChild(link);
      }
      if (data.community_url && isSafeUrl(data.community_url)) {
        const clink = document.createElement('a');
        clink.href = data.community_url; clink.target = '_blank'; clink.rel = 'noopener noreferrer';
        clink.style.cssText = 'color:#888;font-size:0.72rem;text-decoration:none;';
        clink.textContent = 'Join community →';
        linksRow.appendChild(clink);
      }
      if (linksRow.children.length) card.appendChild(linksRow);

      chatEl.appendChild(card);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    initWidget();
</script>
</body>
</html>
