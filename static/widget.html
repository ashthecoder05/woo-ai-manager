<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blockonomics Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1rem;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .logo { font-size: 1.3rem; }
    .header-text h1 { font-size: 0.9rem; font-weight: 600; color: #f0f0f0; }
    .header-text p  { font-size: 0.72rem; color: #888; margin-top: 1px; }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e; margin-left: auto; flex-shrink: 0;
    }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .msg {
      max-width: 88%;
      padding: 0.55rem 0.85rem;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #f7931a;
      color: #000;
      border-bottom-right-radius: 3px;
    }
    .msg.bot {
      align-self: flex-start;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 3px;
    }
    .msg.thinking { opacity: 0.5; font-style: italic; }

    /* Quick prompts */
    #quick-prompts {
      padding: 0 1rem 0.5rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .qp {
      font-size: 0.72rem;
      padding: 0.3rem 0.6rem;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #aaa;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    .qp:hover { border-color: #f7931a; color: #f7931a; }

    /* Input area */
    form {
      display: flex;
      gap: 0.4rem;
      padding: 0.75rem 1rem;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    textarea {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      color: #f0f0f0;
      font-size: 0.85rem;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
      height: 38px;
      max-height: 120px;
      outline: none;
      overflow-y: hidden;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #f7931a; }
    button[type=submit] {
      background: #f7931a;
      color: #000;
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 1rem;
      transition: opacity 0.15s;
    }
    button[type=submit]:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <div class="logo">₿</div>
    <div class="header-text">
      <h1>Blockonomics Assistant</h1>
      <p>Merchant support · Powered by Claude</p>
    </div>
    <div class="status-dot" title="Online"></div>
  </header>

  <div id="chat"></div>

  <div id="quick-prompts">
    <button class="qp" data-q="Why is my payment not confirmed?">Payment stuck?</button>
    <button class="qp" data-q="How do I set up my webhook callback URL?">Webhook setup</button>
    <button class="qp" data-q="What are the current Bitcoin fee rates?">Fee rates</button>
    <button class="qp" data-q="Help me write a product description that accepts Bitcoin">Write copy</button>
    <button class="qp" data-q="Generate a UCP manifest for my store">UCP manifest</button>
  </div>

  <form id="form">
    <textarea id="input" placeholder="Ask about payments, setup, fees, marketing…" rows="1"></textarea>
    <button type="submit" id="btn" aria-label="Send">➤</button>
  </form>

  <script>
    const chatEl = document.getElementById('chat');
    const form   = document.getElementById('form');
    const input  = document.getElementById('input');
    const btn    = document.getElementById('btn');

    // Read params set by embed.js
    const params   = new URLSearchParams(window.location.search);
    const API_URL  = params.get('api')      || '';
    const MERCHANT = params.get('merchant') || '';

    // Pre-load merchant context so the agent knows gateway/platform without asking
    const history = [];
    if (MERCHANT) {
      // Fetch merchant profile and inject as a hidden system context message
      fetch(`${API_URL}/api/merchant?email=${encodeURIComponent(MERCHANT)}`)
        .then(r => r.ok ? r.json() : null)
        .then(m => {
          if (!m) return;
          const ctx = [
            `Merchant context (do not repeat this to the user):`,
            `Email: ${m.email}`,
            m.gateway   ? `Payment gateway: ${m.gateway}`              : '',
            m.platforms?.length ? `Integration: ${m.platforms.join(', ')}` : '',
            m.assistant ? `Assistant channel: ${m.assistant}`          : '',
          ].filter(Boolean).join('\n');
          history.unshift({ role: 'user',      content: ctx });
          history.unshift({ role: 'assistant', content: 'Understood. I will tailor my answers to this merchant.' });
          // Remove the priming exchange after first real message
        })
        .catch(() => {});
    }

    function addMsg(text, role, thinking = false) {
      const div = document.createElement('div');
      div.className = `msg ${role}${thinking ? ' thinking' : ''}`;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    async function sendMessage(text) {
      if (!text.trim()) return;
      input.value = '';
      autoResize();
      btn.disabled = true;

      addMsg(text, 'user');
      history.push({ role: 'user', content: text });

      const thinking = addMsg('Thinking…', 'bot', true);

      try {
        const res = await fetch(`${API_URL}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        thinking.remove();
        const reply = data.reply || data.detail || 'Something went wrong.';
        addMsg(reply, 'bot');
        history.push({ role: 'assistant', content: reply });
      } catch {
        thinking.textContent = 'Network error — check that the assistant backend is running.';
        thinking.classList.remove('thinking');
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage(input.value);
    });

    // Shift+Enter = newline, Enter alone = send
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(input.value);
      }
    });

    // Auto-resize textarea
    function autoResize() {
      input.style.height = '38px';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      input.style.overflowY = input.scrollHeight > 120 ? 'auto' : 'hidden';
    }
    input.addEventListener('input', autoResize);

    // Quick prompt buttons
    document.querySelectorAll('.qp').forEach(btn => {
      btn.addEventListener('click', () => sendMessage(btn.dataset.q));
    });

    // Welcome message
    addMsg(
      "Hi! I'm your Blockchain merchant assistant.\n\n" +
      "Ask me about payment issues, store setup, fee rates, or Bitcoin marketing. " +
      "Use the quick buttons above to get started.",
      'bot'
    );

    // Auto-fetch latest news and show as a proactive update card
    async function loadLatestNews() {
      if (!API_URL) return;
      try {
        const res = await fetch(`${API_URL}/api/news`);
        const data = await res.json();
        if (!data.title) return;

        const card = document.createElement('div');
        card.style.cssText = `
          margin: 0.25rem 0;
          padding: 0.7rem 0.85rem;
          background: rgba(247,147,26,0.08);
          border: 1px solid rgba(247,147,26,0.25);
          border-radius: 10px;
          font-size: 0.78rem;
          line-height: 1.5;
          align-self: flex-start;
          max-width: 92%;
        `;

        const label = document.createElement('div');
        label.style.cssText = 'font-size:0.65rem;font-weight:700;color:#f7931a;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.3rem;';
        label.textContent = 'New update from Blockonomics';

        const title = document.createElement('div');
        title.style.cssText = 'font-weight:600;color:#f0f0f0;margin-bottom:0.2rem;';
        title.textContent = data.title + (data.date ? ` · ${data.date}` : '');

        const body = document.createElement('div');
        body.style.color = '#aaa';
        body.textContent = data.body || '';

        card.appendChild(label);
        card.appendChild(title);
        if (data.body) card.appendChild(body);

        if (data.url) {
          const link = document.createElement('a');
          link.href = data.url;
          link.target = '_blank';
          link.style.cssText = 'color:#f7931a;font-size:0.72rem;text-decoration:none;display:block;margin-top:0.35rem;';
          link.textContent = 'Read full update →';
          card.appendChild(link);
        }

        chatEl.appendChild(card);
        chatEl.scrollTop = chatEl.scrollHeight;
      } catch { /* silently ignore */ }
    }

    loadLatestNews();
</script>
</body>
</html>
