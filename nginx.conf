server {
    listen 80;
    server_name heysarva.com www.heysarva.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name heysarva.com www.heysarva.com;

    # SSL — managed by Cloudflare origin cert
    ssl_certificate     /etc/ssl/heysarva/cert.pem;
    ssl_certificate_key /etc/ssl/heysarva/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Landing page + static files
    location / {
        root /app/static;
        try_files $uri $uri/ /index.html;
    }

    # FastAPI backend — all /api/* and /webhook/* routes
    location ~ ^/(api|webhook|widget|embed\.js|\.well-known)/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Streaming support (for /api/plugin/chat/stream)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
